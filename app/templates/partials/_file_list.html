{% if files %}
<table class="w-full text-sm">
    <thead>
        <tr class="border-b border-gray-200 dark:border-gray-700">
            <th class="text-left py-2 px-3 font-medium text-gray-700 dark:text-gray-300">Name</th>
            <th class="text-left py-2 px-3 font-medium text-gray-700 dark:text-gray-300">Type</th>
            <th class="text-left py-2 px-3 font-medium text-gray-700 dark:text-gray-300">Status</th>
            <th class="w-10"></th>
        </tr>
    </thead>
    <tbody>
        {% for f in files %}
        <tr class="border-b border-gray-100 dark:border-gray-700/50 group" data-id="{{ f.id }}">
            <td class="py-2 px-3">{{ f.name }}</td>
            <td class="py-2 px-3 text-gray-500 dark:text-gray-400">{{ f.input_type }}</td>
            <td class="py-2 px-3">
                <span class="inline-flex items-center gap-1 text-green-600 dark:text-green-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Ingested
                </span>
            </td>
            <td class="py-2 px-3 text-right">
                <button onclick="confirmDeleteFileById({{ f.id }}, '{{ f.name | e }}')" title="Delete file"
                    class="p-1 text-gray-300 dark:text-gray-600 hover:text-red-500 dark:hover:text-red-400 transition-colors rounded">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-sm text-gray-500 dark:text-gray-400 italic">No materials uploaded yet. Use the upload form above to add course materials.</p>
{% endif %}
